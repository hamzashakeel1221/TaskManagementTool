name: SonarCloud Analysis
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Begin Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"hamzashakeel1221_TaskManagementTool" \
            /o:"hamzashakeel1221" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml

      - name: Build Project
        run: dotnet build Backend/TaskManagement.API/TaskManagement.API.csproj --no-incremental

      - name: Build Tests
        run: dotnet build Backend/TaskManagement.Tests/TaskManagement.Tests.csproj --no-incremental

      - name: Run Tests with Coverage
        run: |
          dotnet-coverage collect \
            "dotnet test Backend/TaskManagement.Tests/TaskManagement.Tests.csproj --no-build" \
            -f xml \
            -o coverage.xml

      - name: End Sonar Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"